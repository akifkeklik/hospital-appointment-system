# ╔══════════════════════════════════════════════════════════════════╗
# ║  ⚙️ APPLICATION.PROPERTIES — Uygulama Yapılandırma Dosyası     ║
# ║                                                                  ║
# ║  Bu dosya Spring Boot'a "nasıl çalışacağını" söyler.            ║
# ║  Veritabanı bağlantısı, JPA ayarları, sunucu ayarları           ║
# ║  gibi yapılandırmalar burada yapılır.                            ║
# ╚══════════════════════════════════════════════════════════════════╝

# ────────────────────────────────────────────────────────────
# 🏷️ UYGULAMA ADI
# Spring Boot uygulamasına bir isim veriyoruz
# ────────────────────────────────────────────────────────────
spring.application.name=Hospital Appointment System

# ────────────────────────────────────────────────────────────
# 🐬 MYSQL DATABASE AYARLARI
# ────────────────────────────────────────────────────────────

# Veritabanı bağlantı adresi (URL)
# jdbc:mysql://localhost:3306/hospitaldb → Yerel makinedeki MySQL'de "hospitaldb" veritabanı
spring.datasource.url=jdbc:mysql://localhost:3306/hospitaldb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true

# Veritabanı sürücüsü — MySQL için gerekli driver sınıfı
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MySQL kullanıcı adı ve şifren (Eğer şifren farklıysa lütfen buradan değiştir)
spring.datasource.username=root
spring.datasource.password=12345678

# ────────────────────────────────────────────────────────────
# 🗄️ JPA (Hibernate) AYARLARI
# ────────────────────────────────────────────────────────────

# ⭐ ddl-auto = update
# Bu çok önemli bir ayar! JPA'ya "Entity sınıflarıma bakarak
# veritabanı tablolarını otomatik oluştur veya güncelle" diyor.
#
# Seçenekler:
#   create      → Her başlangıçta tabloları sil ve yeniden oluştur
#   create-drop → create gibi ama uygulama kapanınca tabloları sil
#   update      → Tabloları güncelle, var olanları silme (GELİŞTİRME İÇİN İDEAL)
#   validate    → Sadece kontrol et, değişiklik yapma
#   none        → Hiçbir şey yapma
spring.jpa.hibernate.ddl-auto=update

# Hibernate'in oluşturduğu SQL sorgularını konsola yazdır
# true yapınca → Arkaplanda hangi SQL çalıştığını görürsün (öğrenmek için çok faydalı!)
spring.jpa.show-sql=true

# SQL sorgularını güzel formatlı (okunabilir) yazdır
spring.jpa.properties.hibernate.format_sql=true

# MySQL veritabanı için Hibernate'in hangi SQL "lehçesini" kullanacağı
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ────────────────────────────────────────────────────────────
# 🌍 SUNUCU AYARLARI
# ────────────────────────────────────────────────────────────

# Uygulamanın çalışacağı port (varsayılan: 8080)
# http://localhost:8080 adresinden erişirsin
server.port=8080

# ────────────────────────────────────────────────────────────
# 🔐 JWT (JSON Web Token) AYARLARI
# ────────────────────────────────────────────────────────────
# 256-bit (32 karakterden uzun) güçlü bir şifreleme anahtarı
jwt.secret=4f46e594a08da1fecbb6e8b46990538c7b50b24f46e594a08da1fecbb6e8b4
# Token geçerlilik süresi (Milisaniye) - Örn: 36000000 = 10 Saat
jwt.expiration=36000000
